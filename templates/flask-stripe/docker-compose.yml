services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shipfast
      POSTGRES_PASSWORD: shipfast
      POSTGRES_DB: shipfast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://shipfast:shipfast@db:5432/shipfast
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_xxx}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret}
    depends_on:
      - db

volumes:
  pgdata:
