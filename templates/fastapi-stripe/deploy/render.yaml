services:
  - type: web
    name: nullpointer-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: app-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
databases:
  - name: app-db
    plan: free
