{% extends "accounts/base.html" %}
{% block title %}Sign in &middot; {{PROJECT_NAME}}{% endblock %}
{% block content %}
  <h1>Sign in</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Log in</button>
  </form>
  <p>No account? <a href="/signup/">Create one</a>.</p>
{% endblock %}
