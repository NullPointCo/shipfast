{% extends "accounts/base.html" %}
{% block title %}Sign up &middot; {{PROJECT_NAME}}{% endblock %}
{% block content %}
  <h1>Create your account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">Sign up</button>
  </form>
  <p>Already have an account? <a href="/login/">Log in</a>.</p>
{% endblock %}
