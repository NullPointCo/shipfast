<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{PROJECT_NAME}}{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; color: #111; }
    nav { display: flex; gap: 1rem; padding: 1rem 2rem; background: #0f172a; }
    nav a { color: #e2e8f0; text-decoration: none; }
    nav a:hover { color: #fff; }
    main { max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    .btn { display: inline-block; padding: .6rem 1.2rem; background: #4f46e5; color: #fff;
           border-radius: 6px; text-decoration: none; }
    .btn:hover { background: #4338ca; }
    input, select { padding: .5rem; margin: .3rem 0; width: 100%; box-sizing: border-box; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/subscriptions/pricing/">Pricing</a>
    {% if user.is_authenticated %}
      <a href="/profile/">Profile</a>
    {% else %}
      <a href="/login/">Login</a>
    {% endif %}
  </nav>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
